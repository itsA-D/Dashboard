services:
  django:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECRET_KEY=dev-secret-key
      - DB_NAME=zoop_dev
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - SECURE_SSL_REDIRECT=False
      - SECURE_HSTS_SECONDS=0
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  postgres:
    platform: linux/amd64
    image: postgres:16
    environment:
      - POSTGRES_DB=zoop_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    platform: linux/amd64
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app worker -l INFO -Q ocr,notifications,email,sms,reports,webhooks,periodic
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECRET_KEY=dev-secret-key
      - DB_NAME=zoop_dev
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - SECURE_SSL_REDIRECT=False
      - SECURE_HSTS_SECONDS=0
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  celery-beat:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app beat -l INFO
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECRET_KEY=dev-secret-key
      - DB_NAME=zoop_dev
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - SECURE_SSL_REDIRECT=False
      - SECURE_HSTS_SECONDS=0
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data: